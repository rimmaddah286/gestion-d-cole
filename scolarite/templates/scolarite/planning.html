<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Emploi du Temps</title>
</head>
<body class="container mt-5">
    <h2 class="mb-4 text-primary">Mon Emploi du Temps</h2>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
            <tr>
                <th>Jour</th>
                <th>Matière</th>
                <th>Horaire</th>
                <th>Salle</th>
            </tr>
        </thead>
        <tbody>
            {% for cours in emplois %}
            <tr>
                <td>{{ cours.jour }}</td>
                <td>{{ cours.matiere.libelle }}</td>
                <td>{{ cours.heure_debut|time:"H:i" }} - {{ cours.heure_fin|time:"H:i" }}</td>
                <td><span class="badge bg-info text-dark">{{ cours.salle }}</span></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
